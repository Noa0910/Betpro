{% extends "base.html" %}
{% import "components.html" as ui %}
{% block title %}Acceso - BetPro{% endblock %}
{% block body %}
<div class="login-page min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="login-logo inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4">
        <span class="text-2xl font-black tracking-tight">BP</span>
      </div>
      <h1 class="text-3xl font-bold text-white tracking-tight">BetPro</h1>
      <p class="text-slate-400 mt-2 text-sm uppercase tracking-widest">Trading Deportivo</p>
    </div>

    <form method="post" action="{{ url.ACCESO }}" class="login-card rounded-2xl p-8 shadow-2xl">
      {% if error %}
      <div class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-300 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <label class="block mb-4">
        <span class="text-sm text-slate-400">Usuario</span>
        <input type="text" name="username" required autofocus class="input-field mt-1" autocomplete="username">
      </label>

      <div class="mb-6">
        {{ ui.password_field("Contraseña", "password", autocomplete="current-password") }}
      </div>

      <button type="submit" class="btn-primary w-full">Iniciar sesión</button>
    </form>
  </div>
</div>
<script src="/static/app.js"></script>
{% endblock %}
